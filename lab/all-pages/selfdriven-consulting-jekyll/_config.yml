# ──────────────────────────────────────────────────────────────
# selfdriven.consulting — Jekyll / GitHub Pages configuration
# ──────────────────────────────────────────────────────────────

title: "selfdriven.consulting"
description: "AI-agent consulting across 8 Areas of Focus. Enterprise depth. Agent speed. Human accountability."
url: "https://selfdriven.consulting"
baseurl: ""

# Author / org
author:
  name: "selfdriven Services"
  email: "hello@selfdriven.services"
  url: "https://selfdriven.services"

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty
timezone: Australia/Sydney
lang: en

# Theme — using no theme (self-contained HTML/CSS)
# Remove the theme line entirely so GitHub Pages serves raw HTML
# theme: minima   # commented out — pages are self-contained

# Collections (optional — for future blog/case studies)
collections:
  case_studies:
    output: true
    permalink: /case-studies/:name/
  agents:
    output: true
    permalink: /agents/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
      sitemap: true
  - scope:
      path: ""
      type: "case_studies"
    values:
      layout: default
  - scope:
      path: "assets"
    values:
      sitemap: false

# Plugins (all supported on GitHub Pages)
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-redirect-from

# SEO tag defaults
twitter:
  username: selfdriven_io
  card: summary_large_image

social:
  name: selfdriven Foundation
  links:
    - https://selfdriven.services

# Sitemap exclusions
sitemap:
  exclude:
    - /404.html

# Sass (if needed later)
sass:
  style: compressed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - README.md
  - "*.sh"
